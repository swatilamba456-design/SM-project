<!DOCTYPE html>
<html>
<head>
    <title>View Data</title>
    <style>
        body {
            font-family: Arial;
        }
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
        th {
            background: #ddd;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Production Data</h2>

<table>
    <tr>
        <th>Unit Name</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Month</th>
    </tr>
    <tr>
        <td>ABC Ltd</td>
        <td>Chemical A</td>
        <td>500</td>
        <td>January</td>
    </tr>
</table>

</body>
</html>
