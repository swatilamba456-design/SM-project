<!DOCTYPE html>
<html>
<head>
    <title>S&M System Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('pic1.jpg'); /* keep your same image */
            background-size: cover;
            background-position: center;
            margin: 0;
        }

        /* Dark overlay for better visibility */
        .overlay {
            background: rgba(0, 0, 0, 0.5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1b5e20;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="login-box">

        <h2>Statistics & Monitoring</h2>
        <p>Agriculture & Rural Development Portal</p>

        <input type="text" placeholder="Enter Username" required>
        <input type="password" placeholder="Enter Password" required>

        <select required>
            <option>Select Role</option>
            <option>Admin</option>
            <option>Manufacturer</option>
        </select>

        <button onclick="login()">Login</button>

        <div class="footer">
            Department of Chemicals & Petrochemicals
        </div>

    </div>
</div>

<script>
function login() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
