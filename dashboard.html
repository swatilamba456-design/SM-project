<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - S&M System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url('pic2.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Overlay */
        .overlay {
            background: rgba(0,0,0,0.5);
            min-height: 100vh;
        }

        /* Navbar */
        .nav {
            background: #1b5e20;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .nav h2 {
            margin: 0;
        }

        .nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .nav button {
            background: red;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
        }

        /* Container */
        .container {
            padding: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            flex: 1;
            min-width: 200px;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin: 10px 0;
        }

    </style>
</head>

<body>

<div class="overlay">

    <!-- Navbar -->
    <div class="nav">
        <h2>S&M Dashboard</h2>

        <div>
            <a href="dashboard.html">Home</a>
            <a href="form.html">Enter Data</a>
            <a href="view.html">View Data</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Content -->
    <div class="container">

        <h2 style="color:white;">Welcome to Monitoring System</h2>

        <div class="cards">
            <div class="card">
                <h3>Total Units</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Data Submitted</h3>
                <p>95</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>25</p>
            </div>

            <div class="card">
                <h3>Approved</h3>
                <p>80</p>
            </div>
        </div>

    </div>

</div>

<script>
function logout() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
